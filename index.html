<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'rel='stylesheet'>

</head>
<body>
    <main class="container"> <!--container é uma classe do css que serve para centralizar o conteudo da pagina-->
        <form> <!-- Essa tag cria um formulario -->

            <h1>Login</h1>

                <div class="input-box">
                    <input placeholder="Usuario" type="email">  <!-- Input para o nome de usuário (nesse caso ele usa gmail) -->
                        <i class="bx bxs-user"> </i>  <!-- icone de usuario -->
                </div>
                <div class="input-box">
                    <input placeholder="Senha" type="password">  <!-- Input para a senha -->
                        <i class="bx bxs-lock-alt"> </i>      <!-- icone de senha -->
                </div>
                <div>
                    <label for="">
                    <input type="checkbox">   <!-- checkbox para lembrar o usuario -->
                    Lembrar senha
                    </label>

                    <a href="#">Esqueci minha senha</a>
                </div>
                <button typer="submit">Login</button>
                <div>
                     <p>Nao te uma conta ainda? <a href="#">Registre-se</a></p>
                </div>

                <div>
                </div>



        </form>
    </main> 
</body>
<script src="script.js"></script>
</html>
